version: '3.8'

services:
  # 1. Backend Service (Port 3000)
  app:
    image: 706258268396.dkr.ecr.ap-southeast-2.amazonaws.com/badminton-back:latest
    container_name: badminton-backend
    restart: always
    env_file: .env
    ports:
      - "3000:3000"

  # 2. Frontend Service (Port 80)
  frontend:
    image: 706258268396.dkr.ecr.ap-southeast-2.amazonaws.com/badminton-front:latest
    container_name: badminton-frontend
    restart: always
    ports:
      - "80:3000" # แมพพอร์ต 80 ของเซิร์ฟเวอร์ เข้าหาแอปพอร์ต 3000
